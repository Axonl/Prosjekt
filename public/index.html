<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Steam Game Library - Tracker</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Steam Game Tracker</h1>
            <p>Track your games and manage your gaming backlog</p>
        </div>

        <div id="auth-section">
            <div id="auth-container">
                <!-- Login Form -->
                <div id="login-form-container" class="auth-form-container">
                    <h2>Login</h2>
                    <form onsubmit="handleLogin(event)" id="login-form">
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="loginUsername" 
                                placeholder="Username"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="loginPassword" 
                                placeholder="Password"
                                required
                            >
                        </div>
                        <button type="submit" class="login-btn">Login</button>
                    </form>
                    <p class="auth-toggle">Don't have an account? <a href="#" onclick="toggleAuthForms()">Register</a></p>
                    <div id="login-error" class="auth-error"></div>
                </div>

                <!-- Register Form -->
                <div id="register-form-container" class="auth-form-container" style="display: none;">
                    <h2>Create Account</h2>
                    <form onsubmit="handleRegister(event)" id="register-form">
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="regUsername" 
                                placeholder="Username"
                                minlength="3"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="regPassword" 
                                placeholder="Password"
                                minlength="6"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="regConfirmPassword" 
                                placeholder="Confirm Password"
                                minlength="6"
                                required
                            >
                        </div>
                        <button type="submit" class="login-btn">Create Account</button>
                    </form>
                    <p class="auth-toggle">Already have an account? <a href="#" onclick="toggleAuthForms()">Login</a></p>
                    <div id="register-error" class="auth-error"></div>
                </div>
            </div>
        </div>

        <div id="app-section" style="display: none;">
            <div class="user-profile">
                <img id="userAvatar" alt="Avatar" class="avatar">
                <div class="profile-info">
                    <h2 id="userName"></h2>
                    <a href="/auth/logout" class="logout-btn">Logout</a>
                </div>
                <div id="totalPlaytime" class="total-playtime">Total Playtime: 0h</div>
            </div>

            <div class="game-selection">
                <h3>Your Games Library</h3>
                <input 
                    type="text" 
                    id="gameSearch" 
                    placeholder="Search games..."
                    class="search-input"
                >
                <div id="gamesContainer" class="games-library"></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('playing')">Currently Playing</button>
                <button class="tab-btn" onclick="switchTab('backlog')">Backlog</button>
            </div>

            <div id="playing-tab" class="tab-content active">
                <h3>Currently Playing</h3>
                <div id="playingGames" class="selected-games"></div>
            </div>

            <div id="backlog-tab" class="tab-content">
                <h3>Game Backlog</h3>
                <div id="backlogGames" class="selected-games"></div>
            </div>
        </div>

        <div id="result"></div>
    </div>
</body>
</html>
